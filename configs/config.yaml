universe:
  index: "EURO STOXX 50"
  ticker_list_path: "configs/eurostoxx50_tickers.yaml"

data:
  start_date: "2010-01-01"
  end_date: null          # null = today
  frequency: "1d"
  adjusted: true

alerts:
  trend:
    breakout_windows: [20, 50]
    ma_pairs:
      - [10, 50]
      - [20, 100]
  momentum:
    rsi_window: 14
    rsi_overbought: 70
    rsi_oversold: 30
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    stoch_k: 14
    stoch_d: 3
  volatility:
    bb_window: 20
    bb_std: 2.0
    atr_window: 14
    large_candle_multiplier: 2.0
  volume:
    vol_spike_window: 20
    vol_spike_z_threshold: 2.0
    extreme_return_threshold: 0.03  # 3%
    gap_threshold: 0.01             # 1%

labels:
  horizons: [1, 3, 5]
  failure_threshold: 0.005    # 0.5% minimum meaningful reversal

features:
  return_windows: [1, 3, 5, 10, 20]
  volatility_windows: [5, 10, 20]
  volume_windows: [5, 20]

models:
  main: "xgboost"
  random_state: 42
  n_jobs: -1

validation:
  method: "walk_forward"
  n_splits: 5
  purge_days: 5
  embargo_days: 10
  test_size: 0.2

strategy:
  confidence_threshold: 0.6
  max_positions: 10
  transaction_cost_bps: 10   # 10 basis points round-trip

paths:
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  features: "data/features/"
  models: "results/models/"
  reports: "results/reports/"
  logs: "logs/"
