# IBKR contract specifications for EURO STOXX 50 universe.
# Yahoo ticker → IBKR (symbol, exchange, currency)
# Exchange codes: XETRA (DE), AEB (NL), SBF (FR), BVME (IT), BM (ES),
#                 EBR (BE), HEX (FI)
#
# EUR-only policy: only EUR-denominated contracts are listed here.
# GBP-listed EUROSTOXX 50 members (CRH.L, FLTR.L, NG.L) are intentionally
# excluded — the agent sizes positions in EUR and the EUR sizing does not
# apply to GBP contracts. They remain in eurostoxx50_tickers.yaml so the
# model continues to receive their price data as universe context.

contracts:
