# ─────────────────────────────────────────────────────────────────────────────
# Trading Agent Configuration
# Sensitive values (account ID, ports) are in .env — never commit that file.
# ─────────────────────────────────────────────────────────────────────────────

ibkr:
  host: 127.0.0.1
  paper_port: 4002        # IB Gateway paper trading port
  live_port: 4001         # IB Gateway live trading port
  client_id: 1
  account: ""             # Leave blank — auto-detected from .env (IBKR_ACCOUNT=...)
  timeout: 30

capital:
  initial: 100000.0       # EUR — IBKR paper demo starts with ~$1M, keep ~100K as working capital
  currency: EUR

risk:
  # ── Shared / account-level limits ────────────────────────────────────────────
  max_daily_loss_eur: 300.0      # Stop trading today if down 300 EUR (0.3% of 100K)
  max_position_pct: 0.02         # 2% of NAV per trade = ~2,000 EUR per position
  max_trades_per_day: 999        # no cap — gated by daily_loss + position slots
  min_trade_size_eur: 500.0      # Min 500 EUR — meaningful enough to matter
  commission_rate_pct: 0.05      # IBKR fee: 0.05% of trade value (tiered pricing)
  commission_min_eur: 2.0        # IBKR minimum fee per order (~2 EUR for European stocks)
  commission_per_trade_eur: 10.0 # legacy flat fallback (used only when trade value unknown)

  # ── Default SL/TP/trail (used when no per-horizon override applies) ──────────
  stop_loss_pct: 0.015           # 1.5% — STOXX50 daily ATR ~1.5%
  take_profit_pct: 0.025         # 2.5% — reward/risk 1.67:1
  trail_trigger_pct: 0.010       # 1.0% gain triggers trailing
  trail_step_pct: 0.005          # 0.5% trail step
  max_hold_hours: 6.5            # dead-money exit after 6.5h (h1d only)

  # ── Per-horizon overrides ─────────────────────────────────────────────────────
  # These replace the defaults above when the active model horizon matches.
  # Wider SL/TP for longer holds: multi-day noise is bigger than intraday noise.
  # Reward/risk ratio kept at ~1.67:1 across all horizons.
  #
  # h1d (intraday, EOD close): tight exits — price must move decisively same day.
  #   ATR ~1.5%/day  →  SL=1.5%, TP=2.5%
  h1d:
    stop_loss_pct: 0.015
    take_profit_pct: 0.025
    trail_trigger_pct: 0.010     # 1.0% gain before trailing
    trail_step_pct: 0.005        # 0.5% step
    max_hold_hours: 6.5          # dead-money exit after 6.5h open

  # h3d (swing, 3-day hold): wider range — 3-day ATR ~3-4%.
  #   SL=2.5%, TP=4.0% → reward/risk 1.60:1
  h3d:
    stop_loss_pct: 0.025
    take_profit_pct: 0.040
    trail_trigger_pct: 0.015     # 1.5% before trailing
    trail_step_pct: 0.008        # 0.8% step — preserves most gain
    max_hold_hours: 9999         # no hourly exit; multi-day positions managed by days

  # h5d (position, 5-day hold): 5-day ATR ~5-6%.
  #   SL=3.5%, TP=6.0% → reward/risk 1.71:1
  h5d:
    stop_loss_pct: 0.035
    take_profit_pct: 0.060
    trail_trigger_pct: 0.020     # 2.0% before trailing
    trail_step_pct: 0.010        # 1.0% step
    max_hold_hours: 9999         # no hourly exit

  # h10d (swing/trend, 10-day hold): 10-day ATR ~8-10%.
  #   OOS results: gap_up FOLLOW 58.6% win, Sharpe 0.89; MA cross 56.1% win, Sharpe 0.88
  #   SL=5.0%, TP=8.0% → reward/risk 1.60:1 (wider — ride 10-day trend moves)
  h10d:
    stop_loss_pct: 0.050
    take_profit_pct: 0.080
    trail_trigger_pct: 0.030     # 3.0% before trailing (let it run)
    trail_step_pct: 0.015        # 1.5% step
    max_hold_hours: 9999         # 10-day time exit managed by hold_horizon_days

strategy:
  # Core thesis (Barber & Odean 2008): model predicts P(alert failure).
  # High P(failure) + crowding present → FADE (go against signal direction).
  # Low P(failure) → FOLLOW (go with signal direction).
  fade_threshold: 0.60      # P(fail) >= 0.60 → FADE (crowding gate also required)
  follow_threshold: 0.40    # P(fail) <= 0.40 → FOLLOW (no crowding gate)
  crowding_min_score: 0.30  # minimum crowding score to FADE (Barber & Odean gate)
  regime_threshold_boost: 0.05  # raise fade_threshold when market trends with alert
  default_horizon: 1        # 1-day hold, intraday focus
  allow_short: false        # SHORT DISABLED — IBKR paper borrow not available for European stocks.
                            # Re-enable once IBKR confirms short locates are working on live account.
  monitor_interval_min: 5   # fast loop: trail stops + time exits (every 5 min)
  scan_interval_min: 30     # slow loop: full signal scan (every 30 min)
  eod_close_time: "17:28"   # flatten ALL positions 2 min before exchange close (CET).
                            # EUROSTOXX 50 continuous session ends 17:30 CET (XETRA/SBF/AEB).
                            # 17:28 gives market orders 2 min to fill before auction.
  last_entry_cutoff_min: 10 # stop opening NEW positions this many minutes before eod_close_time.
                            # 17:28 - 10min = last new entry at 17:18 CET.
                            # Ensures bracket orders are placed and at least one monitor
                            # cycle runs before forced flatten.
  max_open_positions: 10    # max simultaneous open long positions

  # Alert whitelist — restrict signal generation to these alert types only.
  # Empty list (or omit) = all alerts considered.
  # Populated from optimizer results (python optimize_strategy.py --yfinance):
  #   gap_up + follow_bullish + h10d: Sharpe 0.891, 58.6% win, 2556 OOS trades
  #   ma_cross_bull_10_50 + follow_bullish + h10d: Sharpe 0.883, 56.5% win
  #   ma_cross_bull_20_100 + follow_bullish + h10d: Sharpe 0.881, 56.1% win
  alert_whitelist: [gap_up, ma_cross_bull_10_50, ma_cross_bull_20_100]

  # ── Per-horizon threshold overrides ───────────────────────────────────────────
  # Applied by _apply_variant() at startup based on the active model horizon.
  # fade_threshold: P(fail) >= threshold → FADE (crowding gate still required).
  # follow_threshold: P(fail) <= threshold → FOLLOW.
  h1d:
    fade_threshold: 0.60
    follow_threshold: 0.40
    win_rate_target: 0.55

  h3d:
    fade_threshold: 0.60
    follow_threshold: 0.40
    win_rate_target: 0.57

  h5d:
    fade_threshold: 0.60
    follow_threshold: 0.40
    win_rate_target: 0.55

  # h10d (swing/trend, 10-day hold): optimizer top pick.
  #   gap_up FOLLOW: 58.6% win, Sharpe 0.891 (2556 OOS trades)
  #   MA cross FOLLOW: 56.1-56.5% win, Sharpe 0.881-0.883
  h10d:
    fade_threshold: 0.60    # OOS results support tight fade threshold
    follow_threshold: 0.40
    win_rate_target: 0.57   # target: above 0.55 based on OOS results

model:
  # Active model variant. Format: h{horizon}d_{mode}
  #   horizon  : 1d | 3d | 5d | 10d  — forward return window used for labels
  #   mode     : longonly (bearish alerts → FADE=BUY)  | both (BUY+SELL FADE)
  #
  # Core thesis (Barber & Odean 2008): all models predict P(alert failure).
  #   longonly = bearish alerts only; agent fades them (BUY contrarian)
  #   both     = all directional alerts; FADE=BUY (bearish) + FADE=SELL (bullish)
  # Active variant: h10d_longonly — trained on gap_up + MA cross bull alerts,
  # predicts P(failure) over 10-day hold. Optimizer pick:
  #   Sharpe 0.891, 58.6% win rate, 2556 OOS trades (gap_up, 7-year data).
  variant: "h10d_longonly"
  # Paths are derived from variant — change variant above, not paths below.
  path: "data/model/xgboost_h10d_longonly.joblib"
  feature_cols_path: "data/model/feature_cols_h10d_longonly.json"
  min_history_days: 252

  # Learning loop — optimised for active paper trading (5 trades/day → fast feedback)
  max_hold_days: 10                   # Close multi-day losing positions after this many days (h10d horizon)
  retrain_frequency_days: 30          # Retrain after N calendar days since last retrain
  retrain_min_trades: 30              # OR retrain after N completed trades since last retrain
  retrain_min_trading_days: 15        # OR retrain after N distinct trading days since last retrain
                                      # Whichever of the three triggers fires first wins.
                                      # Avoids relying on file mtime — retrain date is stored in journal.
  retrain_perf_trigger_pct: 0.10      # Also retrain early if live hit-rate drops 10pp vs baseline
  sample_weight_halflife_days: 252    # Exponential decay: data 1yr old carries ~50% weight
  min_trades_for_recalibration: 10    # Recalibrate thresholds after 10 completed trades
  threshold_step_up: 0.02             # Tighten threshold when losing
  threshold_step_down: 0.01           # Loosen when winning
  win_rate_target: 0.55               # Target hit rate
  suppress_win_rate_threshold: 0.25   # Block alert types with win rate < 25% (after min_trades samples)

data:
  history_days: 2555        # 7 years of calendar days (~1785 trading days) — includes COVID 2020
                            # Literature (Harvey et al. 2022, Bali et al. 2016): include stress regimes.
                            # Exponential weighting (halflife=252d) means 2020 data carries ~13% weight
                            # vs today's 100%, so model stays current without discarding the crisis.
  cache_dir: "data/cache"
  cache_max_age_hours: 20

journal:
  db_path: "data/journal.db"
  log_path: "data/agent.log"

universe:
  parent_tickers_file: "../configs/eurostoxx50_tickers.yaml"
  ibkr_contracts_file: "configs/ibkr_contracts.yaml"
