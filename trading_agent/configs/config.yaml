# ─────────────────────────────────────────────────────────────────────────────
# Trading Agent Configuration
# Sensitive values (account ID, ports) are in .env — never commit that file.
# ─────────────────────────────────────────────────────────────────────────────

ibkr:
  host: 127.0.0.1
  paper_port: 4002        # IB Gateway paper trading port
  live_port: 4001         # IB Gateway live trading port
  client_id: 1
  account: ""             # Leave blank — auto-detected from .env (IBKR_ACCOUNT=...)
  timeout: 30

capital:
  initial: 100000.0       # EUR — IBKR paper demo starts with ~$1M, keep ~100K as working capital
  currency: EUR

risk:
  # ── Shared / account-level limits ────────────────────────────────────────────
  max_daily_loss_eur: 300.0      # Stop trading today if down 300 EUR (0.3% of 100K)
  max_position_pct: 0.02         # 2% of NAV per trade = ~2,000 EUR per position
  max_trades_per_day: 999        # no cap — gated by daily_loss + position slots
  min_trade_size_eur: 500.0      # Min 500 EUR — meaningful enough to matter
  commission_rate_pct: 0.05      # IBKR fee: 0.05% of trade value (tiered pricing)
  commission_min_eur: 2.0        # IBKR minimum fee per order (~2 EUR for European stocks)
  commission_per_trade_eur: 10.0 # legacy flat fallback (used only when trade value unknown)

  # ── Default SL/TP/trail (used when no per-horizon override applies) ──────────
  stop_loss_pct: 0.015           # 1.5% — STOXX50 daily ATR ~1.5%
  take_profit_pct: 0.025         # 2.5% — reward/risk 1.67:1
  trail_trigger_pct: 0.010       # 1.0% gain triggers trailing
  trail_step_pct: 0.005          # 0.5% trail step
  max_hold_hours: 6.5            # dead-money exit after 6.5h (h1d only)

  # ── Per-horizon overrides ─────────────────────────────────────────────────────
  # These replace the defaults above when the active model horizon matches.
  # Wider SL/TP for longer holds: multi-day noise is bigger than intraday noise.
  # Reward/risk ratio kept at ~1.67:1 across all horizons.
  #
  # h1d (intraday, EOD close): tight exits — price must move decisively same day.
  #   ATR ~1.5%/day  →  SL=1.5%, TP=2.5%
  h1d:
    stop_loss_pct: 0.015
    take_profit_pct: 0.025
    trail_trigger_pct: 0.010     # 1.0% gain before trailing
    trail_step_pct: 0.005        # 0.5% step
    max_hold_hours: 6.5          # dead-money exit after 6.5h open

  # h3d (swing, 3-day hold): wider range — 3-day ATR ~3-4%.
  #   SL=2.5%, TP=4.0% → reward/risk 1.60:1
  h3d:
    stop_loss_pct: 0.025
    take_profit_pct: 0.040
    trail_trigger_pct: 0.015     # 1.5% before trailing
    trail_step_pct: 0.008        # 0.8% step — preserves most gain
    max_hold_hours: 9999         # no hourly exit; multi-day positions managed by days

  # h5d (position, 5-day hold): 5-day ATR ~5-6%.
  #   SL=3.5%, TP=6.0% → reward/risk 1.71:1
  h5d:
    stop_loss_pct: 0.035
    take_profit_pct: 0.060
    trail_trigger_pct: 0.020     # 2.0% before trailing
    trail_step_pct: 0.010        # 1.0% step
    max_hold_hours: 9999         # no hourly exit

strategy:
  fade_threshold: 0.60      # P(failure) >= 0.60 → FADE  (lowered from 0.65 — more signals)
  follow_threshold: 0.40    # P(failure) <= 0.40 → FOLLOW (raised from 0.35 — symmetric)
  default_horizon: 1        # 1-day hold, intraday focus
  allow_short: false        # SHORT DISABLED — IBKR paper borrow not available for European stocks.
                            # Re-enable once IBKR confirms short locates are working on live account.
  monitor_interval_min: 5   # fast loop: trail stops + time exits (every 5 min)
  scan_interval_min: 30     # slow loop: full signal scan (every 30 min)
  eod_close_time: "16:27"   # close all positions 3 min BEFORE exchange close (CET).
                            # Gives market orders 3 min to fill; 16:30 is too tight.
  max_open_positions: 10    # max simultaneous open long positions

  # Start with FADE only — we have more data on it. Enable FOLLOW after 50 FADE trades.
  follow_disabled: true

  # Crowding gate (Barber & Odean, 2008):
  #   Only FADE when attention conditions are elevated — vol surge, price extreme,
  #   or multiple concurrent alerts. Low-crowding signals are skipped even if
  #   P(failure) is high, because the model may be flagging a regime shift.
  #   0.30 requires at least one strong indicator (e.g. vol >= 2x avg).
  crowding_min_score: 0.30

  # Regime-aware threshold boost (Lopez de Prado, 2018):
  #   When the broad market is trending IN THE SAME DIRECTION as the alert,
  #   we raise the fade threshold to avoid fading institutional momentum.
  #   E.g. bullish alert in uptrend → effective threshold = 0.60 + 0.05 = 0.65
  regime_threshold_boost: 0.05

model:
  # Active model variant. Format: h{horizon}d_{mode}
  #   horizon : 1d (intraday, default) | 3d (swing) | 5d (multi-day position)
  #   mode    : longonly (BUY entries only) | both (BUY + SELL direction scoring)
  #
  # Default variant: h1d_longonly — intraday fades, BUY entries only, no shorting.
  #   - allow_short=False enforced automatically by _apply_variant at startup
  #   - To enable shorts, select h1d_both (or h3d_both / h5d_both) via --variant
  #     or the interactive menu; shorts require confirmed IBKR locate availability.
  #
  # Note on h1d_both vs h1d_longonly:
  #   h1d_both scores both bearish and bullish alerts (richer signal set, AUC=0.605)
  #   but allow_short=True is required to act on bearish signals. Use it only when
  #   short locates are confirmed on the live account.
  variant: "h1d_longonly"
  # Paths are derived from variant — change variant above, not paths below.
  path: "data/model/xgboost_h1d_longonly.joblib"
  feature_cols_path: "data/model/feature_cols_h1d_longonly.json"
  min_history_days: 252

  # Learning loop — optimised for active paper trading (5 trades/day → fast feedback)
  max_hold_days: 3                    # Close multi-day losing positions after this many days
  retrain_frequency_days: 30          # Full retrain monthly (Jegadeesh & Titman: 1m refresh enough)
  retrain_perf_trigger_pct: 0.10      # Also retrain if live hit-rate drops 10pp vs baseline
  sample_weight_halflife_days: 252    # Exponential decay: data 1yr old carries ~50% weight
  min_trades_for_recalibration: 10    # Recalibrate after 10 completed trades
  threshold_step_up: 0.02             # Tighten threshold when losing
  threshold_step_down: 0.01           # Loosen when winning
  win_rate_target: 0.55               # Target hit rate
  suppress_win_rate_threshold: 0.25   # Block alert types with win rate < 25% (after min_trades samples)

data:
  history_days: 2555        # 7 years of calendar days (~1785 trading days) — includes COVID 2020
                            # Literature (Harvey et al. 2022, Bali et al. 2016): include stress regimes.
                            # Exponential weighting (halflife=252d) means 2020 data carries ~13% weight
                            # vs today's 100%, so model stays current without discarding the crisis.
  cache_dir: "data/cache"
  cache_max_age_hours: 20

journal:
  db_path: "data/journal.db"
  log_path: "data/agent.log"

universe:
  parent_tickers_file: "../configs/eurostoxx50_tickers.yaml"
  ibkr_contracts_file: "configs/ibkr_contracts.yaml"
